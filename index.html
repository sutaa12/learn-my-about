<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日英文法ビジュアル比較 | 英検5級〜2級対応</title>
<style>
/* ========== CSS Custom Properties ========== */
:root {
  --primary: #2563EB;
  --primary-light: #3B82F6;
  --primary-bg: #EFF6FF;
  --secondary: #7C3AED;
  --secondary-light: #8B5CF6;
  --secondary-bg: #F5F3FF;
  --accent: #F59E0B;
  --accent-light: #FBBF24;
  --accent-bg: #FFFBEB;
  --success: #10B981;
  --success-bg: #ECFDF5;
  --error: #EF4444;
  --error-bg: #FEF2F2;
  --text: #1E293B;
  --text-light: #64748B;
  --bg: #F8FAFC;
  --white: #FFFFFF;
  --border: #E2E8F0;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
  --radius: 16px;
  --radius-sm: 8px;
  --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --subject-color: #2563EB;
  --verb-color: #EF4444;
  --object-color: #10B981;
  --particle-color: #F59E0B;
}

/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  line-height: 1.7;
  overflow-x: hidden;
}
a { color: var(--primary); text-decoration: none; }
button { cursor: pointer; font-family: var(--font); }

/* ========== Progress Bar ========== */
#progress-bar {
  position: fixed; top: 0; left: 0; height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
  z-index: 1001; transition: width 0.5s ease; width: 0%;
}

/* ========== Navigation ========== */
nav {
  position: fixed; top: 4px; left: 0; right: 0;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  z-index: 1000; padding: 0;
}
.nav-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px;
}
.nav-title {
  font-size: 1.1rem; font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap; cursor: pointer;
}
.nav-links {
  display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end;
}
.nav-links a {
  padding: 6px 12px; border-radius: var(--radius-sm);
  font-size: 0.75rem; font-weight: 600; color: var(--text-light);
  transition: all 0.3s; white-space: nowrap;
}
.nav-links a:hover { background: var(--primary-bg); color: var(--primary); }
.nav-links a.active { background: var(--primary); color: white; }
.nav-progress {
  font-size: 0.7rem; font-weight: 700; color: var(--text-light);
  white-space: nowrap; margin-left: 8px;
}
.hamburger {
  display: none; background: none; border: none;
  font-size: 1.5rem; color: var(--text); padding: 4px;
}
.nav-drawer {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 12px 20px; flex-direction: column; gap: 4px;
  box-shadow: var(--shadow);
}
.nav-drawer.open { display: flex; }
.nav-drawer a {
  padding: 10px 16px; border-radius: var(--radius-sm);
  font-weight: 600; font-size: 0.9rem; color: var(--text);
}
.nav-drawer a:hover { background: var(--primary-bg); }

/* ========== Grade Selector ========== */
.grade-selector {
  max-width: 1200px; margin: 0 auto; padding: 20px;
}
.grade-selector-title {
  text-align: center; font-size: 1.3rem; font-weight: 800;
  margin-bottom: 20px; color: var(--text);
}
.grade-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.grade-card {
  background: var(--white); border-radius: var(--radius);
  padding: 24px 20px; text-align: center; cursor: pointer;
  border: 2px solid var(--border); transition: all 0.3s;
  box-shadow: var(--shadow);
}
.grade-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.grade-card.active { border-color: var(--primary); }
.grade-card-level {
  font-size: 2rem; font-weight: 900; margin-bottom: 4px;
}
.grade-card-desc {
  font-size: 0.8rem; color: var(--text-light); margin-bottom: 12px; line-height: 1.5;
}
.grade-card-progress {
  font-size: 0.75rem; font-weight: 700; color: var(--text-light);
  background: var(--bg); padding: 4px 12px; border-radius: 20px; display: inline-block;
}

/* ========== Hero ========== */
.hero {
  text-align: center;
  padding: 100px 20px 30px;
  background: linear-gradient(135deg, #1E3A8A 0%, #7C3AED 50%, #EC4899 100%);
  color: white;
}
.hero h1 {
  font-size: 2rem; font-weight: 900; margin-bottom: 8px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}
.hero .subtitle { font-size: 1rem; opacity: 0.9; }

/* ========== Sections ========== */
.section {
  max-width: 900px; margin: 24px auto;
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.6s, transform 0.6s;
}
.section.visible { opacity: 1; transform: translateY(0); }
.section-header {
  padding: 28px 28px 20px; color: white;
}
.step-num {
  font-size: 0.8rem; font-weight: 800; opacity: 0.9;
  margin-bottom: 4px; letter-spacing: 1px;
}
.section-header h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
.section-header .subtitle { font-size: 0.85rem; opacity: 0.9; }
.section-body { padding: 24px 28px 28px; }

/* ========== Compare Grid ========== */
.compare-grid {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 12px; align-items: center; margin-bottom: 16px;
}
.compare-card {
  padding: 20px; border-radius: var(--radius-sm); text-align: center;
}
.ja-card { background: #FEF3C7; border: 2px solid #F59E0B; }
.en-card { background: #DBEAFE; border: 2px solid #2563EB; }
.compare-card h4 { font-size: 0.9rem; margin-bottom: 8px; }
.arrow-container {
  font-size: 1.5rem; font-weight: 900; color: var(--text-light);
}
.pattern-display { font-size: 1.3rem; font-weight: 800; margin: 8px 0; }
.pattern-display .s { color: var(--subject-color); }
.pattern-display .v { color: var(--verb-color); }
.pattern-display .o { color: var(--object-color); }

/* ========== Example Boxes ========== */
.example-box {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 18px;
  margin-bottom: 8px;
}
.example-box.alt { background: var(--bg); }
.example-row {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 0; font-size: 0.95rem;
}
.lang-label {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 0.7rem; font-weight: 800; flex-shrink: 0;
}
.lang-label.ja { background: #FEF3C7; color: #92400E; }
.lang-label.en { background: #DBEAFE; color: #1E40AF; }
.highlight-box {
  padding: 2px 8px; border-radius: 4px; font-weight: 700;
}
.highlight-box.subject { background: #DBEAFE; color: var(--subject-color); }
.highlight-box.verb { background: #FEE2E2; color: var(--verb-color); }
.highlight-box.object { background: #D1FAE5; color: var(--object-color); }
.highlight-box.particle { background: #FDE68A; color: #92400E; }
.p-part { color: var(--particle-color); font-weight: 700; }

/* ========== Info Box ========== */
.info-box {
  padding: 16px 20px; border-radius: var(--radius-sm);
  margin: 16px 0; font-size: 0.9rem;
  display: flex; gap: 10px; align-items: flex-start;
}
.info-box.tip { background: var(--accent-bg); border-left: 4px solid var(--accent); }
.info-box.note { background: var(--primary-bg); border-left: 4px solid var(--primary); }
.info-box-icon { font-size: 1.2rem; flex-shrink: 0; }

/* ========== Cards ========== */
.card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 20px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 1rem; font-weight: 700; margin-bottom: 10px;
}

/* ========== Tables ========== */
.particle-table {
  width: 100%; border-collapse: collapse; margin: 12px 0;
  font-size: 0.85rem;
}
.particle-table th {
  background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
  padding: 10px 14px; text-align: left; font-weight: 700;
  border-bottom: 2px solid var(--border);
}
.particle-table td {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
}
.particle-table tr:hover td { background: var(--bg); }

/* ========== Quiz ========== */
.quiz-section {
  margin-top: 24px; padding-top: 20px; border-top: 2px dashed var(--border);
}
.quiz-section-title {
  font-size: 1.1rem; font-weight: 800; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.tab-buttons { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn {
  padding: 10px 20px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); background: var(--white);
  font-weight: 700; font-size: 0.85rem; color: var(--text-light);
  transition: all 0.3s;
}
.tab-btn.active { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
.tab-btn:hover { border-color: var(--primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }

.quiz-question {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 20px; margin-bottom: 12px;
}
.q-number { font-size: 0.8rem; font-weight: 700; color: var(--text-light); margin-bottom: 8px; }
.q-text { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; line-height: 1.5; }
.q-options { display: flex; flex-direction: column; gap: 8px; }
.q-option {
  padding: 12px 18px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); background: var(--white);
  font-size: 0.9rem; text-align: left; transition: all 0.2s; font-weight: 500;
}
.q-option:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-bg); }
.q-option.selected { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
.q-option.correct { border-color: var(--success); background: var(--success-bg); color: var(--success); }
.q-option.incorrect { border-color: var(--error); background: var(--error-bg); color: var(--error); }
.q-option:disabled { cursor: default; }
.q-explanation {
  margin-top: 12px; padding: 12px 16px; border-radius: var(--radius-sm);
  font-size: 0.85rem; display: none;
}
.q-explanation.show { display: block; }
.q-explanation.correct { background: var(--success-bg); color: #065F46; }
.q-explanation.incorrect { background: var(--error-bg); color: #991B1B; }

.hint-btn {
  margin-top: 8px; padding: 6px 14px; border: 1px solid var(--accent);
  border-radius: var(--radius-sm); background: var(--accent-bg);
  color: #92400E; font-size: 0.8rem; font-weight: 600;
}
.hint-btn:hover { background: #FDE68A; }
.hint-text {
  margin-top: 8px; padding: 10px 14px; background: var(--accent-bg);
  border-radius: var(--radius-sm); font-size: 0.85rem; color: #92400E;
  display: none;
}
.hint-text.show { display: block; }

/* ========== Matching Quiz ========== */
.matching-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px; margin: 16px 0;
}
.matching-column h4 {
  font-size: 0.85rem; font-weight: 700; color: var(--text-light);
  margin-bottom: 12px; text-align: center;
}
.match-item {
  padding: 12px 18px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 8px; text-align: center;
  cursor: pointer; transition: all 0.2s; font-weight: 600; font-size: 0.9rem;
  background: var(--white);
}
.match-item:hover { border-color: var(--primary); }
.match-item.selected { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
.match-item.matched { border-color: var(--success); background: var(--success-bg); color: var(--success); cursor: default; }
.match-item.wrong { border-color: var(--error); background: var(--error-bg); color: var(--error); animation: shake 0.4s; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* ========== Score Display ========== */
.score-display {
  text-align: center; padding: 24px;
  background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
  border-radius: var(--radius); margin-top: 20px; display: none;
}
.score-display.show { display: block; }
.score-number {
  font-size: 3rem; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.score-label { font-size: 0.9rem; color: var(--text-light); }
.score-msg { margin-top: 8px; font-weight: 700; font-size: 1rem; }

/* ========== Sentence Builder ========== */
.builder-exercise {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 20px; margin-bottom: 16px;
}
.builder-hint {
  font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: var(--text);
}
.builder-dropzone {
  min-height: 50px; border: 2px dashed var(--border);
  border-radius: var(--radius-sm); padding: 10px; margin-bottom: 12px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.builder-dropzone.has-words { border-color: var(--primary); }
.word-bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.word-chip {
  padding: 8px 16px; border-radius: 20px; font-weight: 700;
  font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  border: 2px solid var(--primary); color: var(--primary); background: var(--white);
}
.word-chip:hover { background: var(--primary-bg); }
.word-chip.used { opacity: 0.3; cursor: default; pointer-events: none; }
.word-chip.placed {
  background: var(--primary); color: white; cursor: pointer; pointer-events: auto; opacity: 1;
}
.builder-result {
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: 0.85rem; font-weight: 600; margin-top: 8px; display: none;
}
.builder-result.correct { display: block; background: var(--success-bg); color: #065F46; }
.builder-result.incorrect { display: block; background: var(--error-bg); color: #991B1B; }

.builder-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-check, .btn-reset {
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-weight: 700; font-size: 0.85rem; border: none;
}
.btn-check { background: var(--primary); color: white; }
.btn-check:hover { background: var(--primary-light); }
.btn-reset { background: var(--bg); color: var(--text); border: 1px solid var(--border); }

/* ========== Complete Button ========== */
.complete-btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 14px; margin-top: 20px;
  border-radius: var(--radius-sm); border: 2px solid var(--success);
  background: var(--white); color: var(--success);
  font-weight: 700; font-size: 0.9rem; transition: all 0.3s;
}
.complete-btn:hover { background: var(--success-bg); }
.complete-btn.completed {
  background: var(--success); color: white; cursor: default;
}

/* ========== Submit / Retry Buttons ========== */
.btn-submit {
  padding: 12px 28px; border: none; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white; font-weight: 700; font-size: 0.9rem;
  margin-top: 16px; transition: transform 0.2s;
}
.btn-submit:hover { transform: scale(1.03); }
.btn-retry {
  padding: 10px 20px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); background: var(--white);
  font-weight: 700; font-size: 0.85rem; margin-top: 8px;
  display: none;
}

/* ========== Accordion ========== */
.accordion-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 16px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--bg);
  font-size: 0.85rem; font-weight: 600; color: var(--text-light);
  width: 100%; text-align: left; margin: 8px 0; transition: all 0.2s;
}
.accordion-toggle:hover { background: var(--primary-bg); color: var(--primary); }
.accordion-toggle .arrow { transition: transform 0.3s; }
.accordion-toggle.open .arrow { transform: rotate(90deg); }
.accordion-content { display: none; }
.accordion-content.open { display: block; }

/* ========== Back to Top ========== */
#back-to-top {
  position: fixed; bottom: 30px; right: 30px;
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--primary); color: white; border: none;
  font-size: 1.2rem; box-shadow: var(--shadow-lg);
  opacity: 0; pointer-events: none; transition: all 0.3s;
  z-index: 999;
}
#back-to-top.visible { opacity: 1; pointer-events: auto; }
#back-to-top:hover { transform: scale(1.1); }

/* ========== Footer ========== */
footer {
  text-align: center; padding: 40px 20px;
  color: var(--text-light); font-size: 0.85rem;
  border-top: 1px solid var(--border); margin-top: 40px;
}

/* ========== Animations ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== Legend ========== */
.legend {
  display: flex; gap: 16px; flex-wrap: wrap;
  padding: 12px 16px; background: var(--bg);
  border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 0.8rem;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 12px; height: 12px; border-radius: 4px; }

/* ========== Conjunction ========== */
.conj-category { margin-bottom: 20px; }
.conj-category-title {
  font-weight: 700; font-size: 1rem; padding: 8px 16px;
  border-radius: var(--radius-sm); display: inline-block; margin-bottom: 12px;
}
.conj-category-title.cause { background: #FEE2E2; color: #DC2626; }
.conj-category-title.contrast { background: #DBEAFE; color: #2563EB; }
.conj-category-title.addition { background: #D1FAE5; color: #059669; }
.conj-category-title.condition { background: #FDE68A; color: #92400E; }

/* ========== Flow Diagram ========== */
.flow-diagram {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin: 12px 0; flex-wrap: wrap;
}
.flow-box {
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-weight: 700; font-size: 0.85rem;
}
.flow-box.sentence { background: var(--primary-bg); color: var(--primary); }
.flow-box.conjunction { background: var(--accent-bg); color: #92400E; }
.flow-arrow { font-size: 1.2rem; color: var(--text-light); }

/* ========== Modifier Styles ========== */
.modifier-flow {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0; font-size: 0.95rem; flex-wrap: wrap;
}
.modifier-box {
  padding: 4px 10px; border-radius: 4px; font-weight: 700;
}
.modifier-box.noun { background: #DBEAFE; color: var(--subject-color); }
.modifier-box.adj { background: #FDE68A; color: #92400E; }
.modifier-box.rel { background: #E9D5FF; color: var(--secondary); }
.mod-arrow { color: var(--text-light); font-weight: 700; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .hero h1 { font-size: 1.5rem; }
  .nav-links { display: none; }
  .hamburger { display: block; }
  .section-header { padding: 20px; }
  .section-header h2 { font-size: 1.1rem; }
  .section-body { padding: 16px 20px 20px; }
  .compare-grid { grid-template-columns: 1fr; gap: 8px; }
  .arrow-container { transform: rotate(90deg); text-align: center; }
  .matching-grid { grid-template-columns: 1fr; }
  .grade-cards { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
}
@media (max-width: 480px) {
  .hero { padding: 90px 16px 24px; }
  .hero h1 { font-size: 1.2rem; }
  .section { margin: 12px 8px; }
  .grade-cards { grid-template-columns: 1fr 1fr; gap: 10px; }
  .grade-card { padding: 16px 12px; }
  .grade-card-level { font-size: 1.5rem; }
}
</style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
  <div class="nav-inner">
    <span class="nav-title" onclick="showGradeSelector()">🇯🇵 日英文法ビジュアル比較 🇬🇧</span>
    <div class="nav-links" id="navLinks"></div>
    <span class="nav-progress" id="navProgressText">0 / 0 完了</span>
    <button class="hamburger" id="hamburgerBtn" aria-label="メニュー">☰</button>
  </div>
  <div class="nav-drawer" id="navDrawer"></div>
</nav>

<header class="hero">
  <h1>🇯🇵 日英文法ビジュアル比較 🇬🇧</h1>
  <div class="subtitle">英検5級〜2級対応 ｜ 日本語との違いを視覚的に学ぶ</div>

const STORAGE_KEY = 'jpen-grammar-v3';
let currentGrade = null;
let completedTopics = new Set();
let quizScores = {};

function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (data) {
      completedTopics = new Set(data.completedTopics || []);
      quizScores = data.quizScores || {};
    }
  } catch(e) {}
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completedTopics: [...completedTopics],
      quizScores: quizScores
    }));
  } catch(e) {}
}

/* ========================================================================
 * RENDERING ENGINE
 * ======================================================================== */
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderHighlightedParts(parts) {
  if (typeof parts === 'string') return escHtml(parts);
  return parts.map(p => {
    if (Array.isArray(p)) {
      const [text, cls] = p;
      const classMap = { s: 'subject', v: 'verb', o: 'object', p: 'particle' };
      return '<span class="highlight-box ' + (classMap[cls] || '') + '">' + escHtml(text) + '</span>';
    }
    return escHtml(p);
  }).join(' ');
}

function renderExampleBox(item, alt) {
  const cls = alt ? 'example-box alt' : 'example-box';
  const jaHtml = typeof item.ja === 'string' ? escHtml(item.ja) : renderHighlightedParts(item.ja);
  const enHtml = typeof item.en === 'string' ? escHtml(item.en) : renderHighlightedParts(item.en);
  return '<div class="' + cls + '">' +
    '<div class="example-row"><span class="lang-label ja">日</span><span>' + jaHtml + '</span></div>' +
    '<div class="example-row"><span class="lang-label en">英</span><span lang="en">' + enHtml + '</span></div>' +
    '</div>';
}

function renderContentBlock(block) {
  switch (block.type) {
    case 'compare':
      return '<div class="compare-grid">' +
        '<div class="compare-card ja-card"><h4>' + block.ja.title + '</h4>' +
        '<div style="font-size:1.2rem;font-weight:800;margin:8px 0;">' + block.ja.pattern + '</div>' +
        '<p style="font-size:0.85rem;color:var(--text-light)">' + block.ja.note + '</p></div>' +
        '<div class="arrow-container">⟷</div>' +
        '<div class="compare-card en-card"><h4>' + block.en.title + '</h4>' +
        '<div style="font-size:1.2rem;font-weight:800;margin:8px 0;">' + block.en.pattern + '</div>' +
        '<p style="font-size:0.85rem;color:var(--text-light)">' + block.en.note + '</p></div></div>';

    case 'tip':
      return '<div class="info-box tip"><span class="info-box-icon">💡</span><div>' + block.text + '</div></div>';

    case 'note':
      return '<div class="info-box note"><span class="info-box-icon">📝</span><div>' + block.text + '</div></div>';

    case 'examples':
      let h = '';
      if (block.heading) h = '<h3 style="margin:20px 0 12px;font-size:1.1rem;">' + escHtml(block.heading) + '</h3>';
      return h + block.items.map((item, i) => renderExampleBox(item, i % 2 === 1)).join('');

    case 'table':
      let t = '<table class="particle-table"><thead><tr>';
      block.headers.forEach(h => { t += '<th>' + escHtml(h) + '</th>'; });
      t += '</tr></thead><tbody>';
      block.rows.forEach(row => {
        t += '<tr>';
        row.forEach(cell => { t += '<td>' + cell + '</td>'; });
        t += '</tr>';
      });
      t += '</tbody></table>';
      return t;

    case 'perspective':
      let pHtml = '<div class="card" style="border-left:4px solid var(--secondary);margin-top:16px;">';
      pHtml += '<div class="card-title">' + block.title + '</div>';
      pHtml += '<div style="font-size:0.9rem;line-height:1.8;">';
      block.paragraphs.forEach((p, i) => {
        pHtml += '<p' + (i > 0 ? ' style="margin-top:8px;"' : '') + '>' + p + '</p>';
      });
      if (block.example) {
        pHtml += '<div class="example-box" style="margin-top:12px;">';
        pHtml += '<div class="example-row"><span class="lang-label ja">日</span><span>' + escHtml(block.example.ja) + '</span></div>';
        pHtml += '<div class="example-row"><span class="lang-label en">英</span><span lang="en">' + escHtml(block.example.en) + '</span></div>';
        pHtml += '</div>';
      }
      pHtml += '</div></div>';
      return pHtml;

    case 'heading':
      return '<h3 style="margin:20px 0 12px;font-size:1.1rem;">' + escHtml(block.text) + '</h3>';

    case 'conj-category':
      let cHtml = '<div class="conj-category">';
      cHtml += '<div class="conj-category-title ' + (block.cls || '') + '">' + block.title + '</div>';
      if (block.examples) {
        block.examples.forEach((ex, i) => { cHtml += renderExampleBox(ex, i % 2 === 1); });
      }
      if (block.flow) {
        cHtml += '<div class="flow-diagram">';
        block.flow.forEach((f, i) => {
          if (i > 0) cHtml += '<span class="flow-arrow">' + (f.arrow || '→') + '</span>';
          if (f.text) cHtml += '<div class="flow-box ' + (f.cls || 'sentence') + '">' + escHtml(f.text) + '</div>';
        });
        cHtml += '</div>';
      }
      cHtml += '</div>';
      return cHtml;

    default:
      return '';
  }
}

function renderTopic(topic, gradeId, topicIdx) {
  const tid = topic.id;
  let html = '<section class="section" id="' + tid + '">';
  html += '<div class="section-header" style="background:' + topic.gradient + ';">';
  html += '<div class="step-num">TOPIC ' + (topicIdx + 1) + '</div>';
  html += '<h2>' + escHtml(topic.title) + '</h2>';
  html += '<div class="subtitle">' + escHtml(topic.subtitle) + '</div>';
  html += '</div><div class="section-body">';

  // Render content blocks
  topic.content.forEach(block => { html += renderContentBlock(block); });

  // Quiz section (解説を見ながら回答)
  if (topic.quizzes) {
    html += '<div class="quiz-section">';
    html += '<div class="quiz-section-title">📝 このトピックのクイズに挑戦</div>';
    html += '<div class="tab-buttons">';
    html += '<button class="tab-btn active" onclick="switchQuizTab(\'' + tid + '\',\'mc\',this)">選択式</button>';
    html += '<button class="tab-btn" onclick="switchQuizTab(\'' + tid + '\',\'match\',this)">マッチング</button>';
    html += '<button class="tab-btn" onclick="switchQuizTab(\'' + tid + '\',\'fill\',this)">穴埋め</button>';
    html += '<button class="tab-btn" onclick="switchQuizTab(\'' + tid + '\',\'build\',this)">文の組み立て</button>';
    html += '</div>';

    // MC tab
    html += '<div class="tab-content active" id="tab-' + tid + '-mc">';
    html += '<div id="mc-container-' + tid + '"></div>';
    html += '<button class="btn-submit" onclick="submitMC(\'' + tid + '\')">回答を確認する</button>';
    html += '<div class="score-display" id="mc-score-' + tid + '"><div class="score-number" id="mc-score-num-' + tid + '"></div><div class="score-label">正解率</div><div class="score-msg" id="mc-score-msg-' + tid + '"></div></div>';
    html += '<button class="btn-retry" id="mc-retry-' + tid + '" onclick="initMC(\'' + tid + '\')">もう一度挑戦する</button>';
    html += '</div>';

    // Match tab
    html += '<div class="tab-content" id="tab-' + tid + '-match">';
    html += '<div id="match-container-' + tid + '"></div>';

    html += '<button class="btn-retry" id="match-retry-' + tid + '" onclick="initMatch(\'' + tid + '\')">もう一度挑戦する</button>';

function renderSummary(grade) {

  html += '<div class="subtitle">同じ内容を日本語と英語で読み比べ、構造の違いを実感しよう</div>';
  html += '</div><div class="section-body">';

  grade.summary.forEach((passage, i) => {
    const colors = ['var(--primary)', 'var(--secondary)', '#059669'];
    html += '<div class="card" style="border-left:4px solid ' + colors[i % 3] + ';' + (i > 0 ? 'margin-top:16px;' : '') + '">';
    html += '<div class="card-title">' + passage.title + '</div>';

    html += '<div class="example-row"><span class="lang-label en">英</span><span lang="en" style="line-height:1.9;">' + escHtml(passage.en) + '</span></div>';
    html += '</div>';
    html += '<div class="info-box note" style="margin-top:12px;"><span class="info-box-icon">📝</span><div>' + escHtml(passage.analysis) + '</div></div>';
    html += '</div>';
  });

  const isCompleted = completedTopics.has(sid);
  html += '<button class="complete-btn' + (isCompleted ? ' completed' : '') + '" id="complete-' + sid + '" onclick="completeTopic(\'' + sid + '\')">';
  html += isCompleted ? '✅ 完了しました！' : '✅ 総括を完了にする';
  html += '</button>';

  html += '</div></section>';
  return html;
}

function renderGradeSelector() {
  let html = '<div class="grade-selector">';
  html += '<div class="grade-selector-title">級を選んでください</div>';
  html += '<div class="grade-cards">';
  GRADES_DATA.forEach(grade => {
    const topicCount = grade.topics.length;
    const completed = grade.topics.filter(t => completedTopics.has(t.id)).length;

    html += '<div class="grade-card-level" style="color:' + grade.color + ';">' + escHtml(grade.label) + '</div>';
    html += '<div class="grade-card-desc">' + escHtml(grade.description) + '</div>';
    html += '<div class="grade-card-progress">' + completed + ' / ' + topicCount + ' 完了</div>';
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderGradePage(grade) {
  let html = '';
  grade.topics.forEach((topic, idx) => {
    html += renderTopic(topic, grade.id, idx);
  });
  html += renderSummary(grade);
  return html;
}

/* ========================================================================
 * NAVIGATION
 * ======================================================================== */
function showGradeSelector() {
  currentGrade = null;
  document.getElementById('app').innerHTML = renderGradeSelector();
  updateNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectGrade(gradeId) {
  const grade = GRADES_DATA.find(g => g.id === gradeId);
  if (!grade) return;
  currentGrade = grade;
  document.getElementById('app').innerHTML = renderGradePage(grade);
  updateNav();
  initAllQuizzes(grade);
  observeSections();
  window.scrollTo({ top: 0 });
}

function updateNav() {
  const navLinks = document.getElementById('navLinks');
  const navDrawer = document.getElementById('navDrawer');

  if (!currentGrade) {
    navLinks.innerHTML = '';
    navDrawer.innerHTML = '';
    updateProgressBar();
    return;
  }

  let linksHtml = '<a href="#" onclick="event.preventDefault();showGradeSelector()">← 級選択</a>';
  let drawerHtml = '<a href="#" onclick="event.preventDefault();showGradeSelector();closeDrawer()">← 級選択に戻る</a>';

  currentGrade.topics.forEach((topic, i) => {
    linksHtml += '<a href="#' + topic.id + '">Topic' + (i + 1) + '</a>';
    drawerHtml += '<a href="#' + topic.id + '" onclick="closeDrawer()">' + escHtml(topic.title) + '</a>';
  });
  linksHtml += '<a href="#summary-' + currentGrade.id + '">総括</a>';
  drawerHtml += '<a href="#summary-' + currentGrade.id + '" onclick="closeDrawer()">総括</a>';

  navLinks.innerHTML = linksHtml;
  navDrawer.innerHTML = drawerHtml;
  updateProgressBar();
}

function updateProgressBar() {
  if (!currentGrade) {
    const total = GRADES_DATA.reduce((sum, g) => sum + g.topics.length + 1, 0);
    const done = completedTopics.size;
    document.getElementById('progress-bar').style.width = (total > 0 ? (done / total) * 100 : 0) + '%';
    document.getElementById('navProgressText').textContent = done + ' / ' + total + ' 完了';
    return;
  }
  const total = currentGrade.topics.length + 1; // +1 for summary
  const done = currentGrade.topics.filter(t => completedTopics.has(t.id)).length +
    (completedTopics.has('summary-' + currentGrade.id) ? 1 : 0);
  document.getElementById('progress-bar').style.width = (done / total) * 100 + '%';
  document.getElementById('navProgressText').textContent = done + ' / ' + total + ' 完了';
}

function completeTopic(topicId) {
  completedTopics.add(topicId);
  saveProgress();
  const btn = document.getElementById('complete-' + topicId);
  if (btn) { btn.classList.add('completed'); btn.innerHTML = '✅ 完了しました！'; }
  updateProgressBar();
}

/* ========================================================================
 * QUIZ ENGINE
 * ======================================================================== */
const quizState = {};

function getTopicQuizData(topicId, type) {
  for (const grade of GRADES_DATA) {
    const topic = grade.topics.find(t => t.id === topicId);
    if (topic && topic.quizzes && topic.quizzes[type]) return topic.quizzes[type];
  }
  return [];
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function switchQuizTab(topicId, tabName, btn) {
  const parent = btn.closest('.quiz-section');
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  parent.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + topicId + '-' + tabName).classList.add('active');
}

// Multiple Choice
function initMC(topicId) {
  const data = getTopicQuizData(topicId, 'mc');
  if (!data.length) return;
  const container = document.getElementById('mc-container-' + topicId);
  if (!container) return;
  const state = { answers: {}, submitted: false };
  quizState['mc-' + topicId] = state;

  // Shuffle questions
  const shuffled = shuffleArray(data.map((q, i) => ({ ...q, origIdx: i })));
  state.questions = shuffled;

  let html = '';
  shuffled.forEach((q, idx) => {
    html += '<div class="quiz-question" id="mc-q-' + topicId + '-' + idx + '">';
    html += '<div class="q-number">問題 ' + (idx + 1) + ' / ' + shuffled.length + '</div>';
    html += '<div class="q-text">📝 ' + escHtml(q.q) + '</div>';
    html += '<div class="q-options">';
    q.opts.forEach((opt, oi) => {
      html += '<button class="q-option" onclick="selectMC(\'' + topicId + '\',' + idx + ',' + oi + ')">' + escHtml(opt) + '</button>';
    });
    html += '</div>';
    html += '<button class="hint-btn" onclick="toggleHint(this)">💡 ヒントを見る</button>';
    html += '<div class="hint-text">解説の例文を振り返ってみましょう。上にスクロールして確認できます。</div>';
    html += '<div class="q-explanation" id="mc-exp-' + topicId + '-' + idx + '"></div>';
    html += '</div>';
  });
  container.innerHTML = html;

  // Reset score & retry
  const scoreEl = document.getElementById('mc-score-' + topicId);
  if (scoreEl) scoreEl.classList.remove('show');
  const retryEl = document.getElementById('mc-retry-' + topicId);
  if (retryEl) retryEl.style.display = 'none';
}

function selectMC(topicId, qIdx, optIdx) {
  const state = quizState['mc-' + topicId];
  if (!state || state.submitted) return;
  state.answers[qIdx] = optIdx;
  const q = document.getElementById('mc-q-' + topicId + '-' + qIdx);
  q.querySelectorAll('.q-option').forEach((btn, i) => {
    btn.classList.toggle('selected', i === optIdx);
  });
}

function submitMC(topicId) {
  const state = quizState['mc-' + topicId];
  if (!state || state.submitted) return;
  state.submitted = true;

  let correct = 0;
  state.questions.forEach((q, idx) => {
    const selected = state.answers[idx];
    const qEl = document.getElementById('mc-q-' + topicId + '-' + idx);
    const expEl = document.getElementById('mc-exp-' + topicId + '-' + idx);
    const btns = qEl.querySelectorAll('.q-option');

    btns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('correct');
      if (i === selected && i !== q.ans) btn.classList.add('incorrect');
    });

    const isCorrect = selected === q.ans;
    if (isCorrect) correct++;
    expEl.className = 'q-explanation show ' + (isCorrect ? 'correct' : 'incorrect');
    expEl.textContent = (isCorrect ? '✅ 正解！ ' : '❌ 不正解。') + q.exp;
  });

  showQuizScore(topicId, 'mc', correct, state.questions.length);
}

// Matching
function initMatch(topicId) {
  const data = getTopicQuizData(topicId, 'match');
  if (!data.length) return;
  const container = document.getElementById('match-container-' + topicId);
  if (!container) return;

  const state = { selectedLeft: null, matchedPairs: [], wrongCount: 0 };
  quizState['match-' + topicId] = state;

  const shuffledRight = shuffleArray(data.map((_, i) => i));
  state.shuffledRight = shuffledRight;
  state.data = data;

  let html = '<div class="matching-grid"><div class="matching-column"><h4>🇯🇵 日本語</h4>';
  data.forEach((item, i) => {
    html += '<div class="match-item" id="ml-' + topicId + '-' + i + '" onclick="handleMatchClick(\'' + topicId + '\',\'left\',' + i + ')">' + escHtml(item.ja) + '</div>';
  });
  html += '</div><div class="matching-column"><h4>🇬🇧 English</h4>';
  shuffledRight.forEach(origIdx => {
    html += '<div class="match-item" id="mr-' + topicId + '-' + origIdx + '" onclick="handleMatchClick(\'' + topicId + '\',\'right\',' + origIdx + ')">' + escHtml(data[origIdx].en) + '</div>';
  });
  html += '</div></div>';
  container.innerHTML = html;

  document.getElementById('match-feedback-' + topicId).innerHTML = '';
  const scoreEl = document.getElementById('match-score-' + topicId);
  if (scoreEl) scoreEl.classList.remove('show');
  const retryEl = document.getElementById('match-retry-' + topicId);
  if (retryEl) retryEl.style.display = 'none';
}

function handleMatchClick(topicId, side, idx) {
  const state = quizState['match-' + topicId];
  if (!state) return;
  if (state.matchedPairs.includes(idx) && side === 'left') return;
  if (state.matchedPairs.includes(idx) && side === 'right') return;

  if (side === 'left') {
    // Deselect previous
    if (state.selectedLeft !== null) {
      const prev = document.getElementById('ml-' + topicId + '-' + state.selectedLeft);
      if (prev) prev.classList.remove('selected');
    }
    state.selectedLeft = idx;
    document.getElementById('ml-' + topicId + '-' + idx).classList.add('selected');
  } else {
    // Right side clicked
    if (state.selectedLeft === null) return;
    const leftIdx = state.selectedLeft;

    if (leftIdx === idx) {
      // Correct match
      document.getElementById('ml-' + topicId + '-' + leftIdx).classList.remove('selected');
      document.getElementById('ml-' + topicId + '-' + leftIdx).classList.add('matched');
      document.getElementById('mr-' + topicId + '-' + idx).classList.add('matched');
      state.matchedPairs.push(leftIdx);
      state.selectedLeft = null;

      const fb = document.getElementById('match-feedback-' + topicId);
      fb.innerHTML = '<div class="info-box tip"><span class="info-box-icon">✅</span><div>正解！ ' + escHtml(state.data[leftIdx].jaFull) + ' → ' + escHtml(state.data[leftIdx].enFull) + '</div></div>';

      if (state.matchedPairs.length === state.data.length) {
        showQuizScore(topicId, 'match', state.data.length - state.wrongCount, state.data.length);
      }
    } else {
      // Wrong match
      state.wrongCount++;
      const rEl = document.getElementById('mr-' + topicId + '-' + idx);
      const lEl = document.getElementById('ml-' + topicId + '-' + leftIdx);
      rEl.classList.add('wrong');
      lEl.classList.add('wrong');
      setTimeout(() => {
        rEl.classList.remove('wrong');
        lEl.classList.remove('wrong', 'selected');
      }, 600);
      state.selectedLeft = null;

      document.getElementById('match-feedback-' + topicId).innerHTML =
        '<div class="info-box note"><span class="info-box-icon">❌</span><div>不正解。もう一度やってみてください。</div></div>';
    }
  }
}

// Sentence Builder
function initBuild(topicId) {
  const data = getTopicQuizData(topicId, 'build');
  if (!data.length) return;
  const container = document.getElementById('build-container-' + topicId);
  if (!container) return;

  let html = '';
  data.forEach((ex, idx) => {
    const shuffledWords = shuffleArray(ex.words);
    html += '<div class="builder-exercise" id="build-ex-' + topicId + '-' + idx + '">';
    html += '<div class="builder-hint">🎯 ' + escHtml(ex.hint) + '</div>';
    html += '<div class="builder-dropzone" id="build-drop-' + topicId + '-' + idx + '"></div>';
    html += '<div class="word-bank" id="build-bank-' + topicId + '-' + idx + '">';
    shuffledWords.forEach((word, wi) => {
      html += '<span class="word-chip" data-word="' + escHtml(word) + '" onclick="clickBankWord(\'' + topicId + '\',' + idx + ',this)">' + escHtml(word) + '</span>';
    });
    html += '</div>';
    html += '<div class="builder-btns">';
    html += '<button class="btn-check" onclick="checkBuild(\'' + topicId + '\',' + idx + ')">確認する</button>';
    html += '<button class="btn-reset" onclick="resetBuild(\'' + topicId + '\',' + idx + ')">リセット</button>';
    html += '</div>';
    html += '<div class="builder-result" id="build-result-' + topicId + '-' + idx + '"></div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function clickBankWord(topicId, exIdx, chip) {
  if (chip.classList.contains('used')) return;
  chip.classList.add('used');
  const dropzone = document.getElementById('build-drop-' + topicId + '-' + exIdx);
  dropzone.classList.add('has-words');
  const placed = document.createElement('span');
  placed.className = 'word-chip placed';
  placed.textContent = chip.dataset.word;
  placed.onclick = function() {
    dropzone.removeChild(placed);
    chip.classList.remove('used');
    if (!dropzone.children.length) dropzone.classList.remove('has-words');
  };
  dropzone.appendChild(placed);
}

function resetBuild(topicId, exIdx) {
  const bank = document.getElementById('build-bank-' + topicId + '-' + exIdx);
  const dropzone = document.getElementById('build-drop-' + topicId + '-' + exIdx);
  const result = document.getElementById('build-result-' + topicId + '-' + exIdx);
  bank.querySelectorAll('.word-chip').forEach(c => c.classList.remove('used'));
  dropzone.innerHTML = '';
  dropzone.classList.remove('has-words');
  result.className = 'builder-result';
  result.textContent = '';
}

function checkBuild(topicId, exIdx) {
  const data = getTopicQuizData(topicId, 'build');
  if (!data[exIdx]) return;
  const dropzone = document.getElementById('build-drop-' + topicId + '-' + exIdx);
  const result = document.getElementById('build-result-' + topicId + '-' + exIdx);
  const placed = [...dropzone.querySelectorAll('.word-chip')].map(c => c.textContent);
  const answer = data[exIdx].answer;

  if (placed.join(' ') === answer.join(' ')) {
    result.className = 'builder-result correct';
    result.textContent = '✅ 正解！ ' + answer.join(' ');
  } else {
    result.className = 'builder-result incorrect';
    result.textContent = '❌ 不正解。正解は: ' + answer.join(' ');
  }
}

function toggleHint(btn) {
  const hintEl = btn.nextElementSibling;
  hintEl.classList.toggle('show');
  btn.textContent = hintEl.classList.contains('show') ? '💡 ヒントを閉じる' : '💡 ヒントを見る';
}

function showQuizScore(topicId, type, correct, total) {
  const pct = Math.round((correct / total) * 100);
  const scoreEl = document.getElementById(type + '-score-' + topicId);
  const numEl = document.getElementById(type + '-score-num-' + topicId);
  const msgEl = document.getElementById(type + '-score-msg-' + topicId);
  const retryEl = document.getElementById(type + '-retry-' + topicId);

  if (numEl) numEl.textContent = pct + '%';
  if (msgEl) {
    if (pct === 100) msgEl.textContent = '🎉 パーフェクト！すばらしい！';
    else if (pct >= 80) msgEl.textContent = '👏 よくできました！';
    else if (pct >= 60) msgEl.textContent = '📚 もう少し復習しましょう！';
    else msgEl.textContent = '💪 解説を読み直してもう一度挑戦しよう！';
  }
  if (scoreEl) scoreEl.classList.add('show');
  if (retryEl) retryEl.style.display = 'inline-flex';

  quizScores[topicId + '-' + type] = pct;
  saveProgress();
}

function initAllQuizzes(grade) {
  grade.topics.forEach(topic => {
    initMC(topic.id);
    initMatch(topic.id);
    initFill(topic.id);
    initBuild(topic.id);
  });
}

const hamburgerBtn = document.getElementById('hamburgerBtn');
const navDrawer = document.getElementById('navDrawer');

function closeDrawer() { navDrawer.classList.remove('open'); }

hamburgerBtn.addEventListener('click', () => {
  navDrawer.classList.toggle('open');
});

document.addEventListener('click', (e) => {
  if (!navDrawer.contains(e.target) && !hamburgerBtn.contains(e.target)) closeDrawer();
});

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

// Scroll observer for section animations
function observeSections() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  document.querySelectorAll('.section').forEach(s => observer.observe(s));

  // Active nav link
  const navObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
        const link = document.querySelector('.nav-links a[href="#' + id + '"]');
        if (link) link.classList.add('active');
      }
    });
  }, { threshold: 0.3 });
  document.querySelectorAll('section[id]').forEach(s => navObserver.observe(s));
}

// Back to top
const backToTop = document.getElementById('back-to-top');
window.addEventListener('scroll', () => {
  backToTop.classList.toggle('visible', window.scrollY > 400);
});

/* ========================================================================
 * INITIALIZATION
 * ======================================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadProgress();
  showGradeSelector();
});
</script>
</body>
